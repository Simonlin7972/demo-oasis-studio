<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>綠洲所 Oasis Studio — 打造屬於你的城市綠洲</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html, body { margin: 0; padding: 0; background: var(--paper); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>

  <!-- Data -->
  <script src="data/data.js"></script>

  <!-- Utils -->
  <script type="text/babel" src="src/utils/format.js"></script>

  <!-- UI Components (no deps on hooks) -->
  <script type="text/babel" src="src/components/ui/Icon.jsx"></script>
  <script type="text/babel" src="src/components/ui/SafeImg.jsx"></script>

  <!-- Hooks -->
  <script type="text/babel" src="src/hooks/useCountdown.js"></script>
  <script type="text/babel" src="src/hooks/useToast.jsx"></script>
  <script type="text/babel" src="src/hooks/useWishlist.js"></script>
  <script type="text/babel" src="src/hooks/useCart.js"></script>
  <script type="text/babel" src="src/hooks/useCarousel.js"></script>

  <!-- Layout -->
  <script type="text/babel" src="src/components/layout/ViewportProvider.jsx"></script>
  <script type="text/babel" src="src/components/layout/Nav.jsx"></script>
  <script type="text/babel" src="src/components/layout/Footer.jsx"></script>

  <!-- UI Components (depend on hooks/layout) -->
  <script type="text/babel" src="src/components/ui/ProductCard.jsx"></script>

  <!-- Sections -->
  <script type="text/babel" src="src/components/sections/Hero.jsx"></script>
  <script type="text/babel" src="src/components/sections/Promo.jsx"></script>
  <script type="text/babel" src="src/components/sections/Featured.jsx"></script>
  <script type="text/babel" src="src/components/sections/Categories.jsx"></script>
  <script type="text/babel" src="src/components/sections/Scenarios.jsx"></script>
  <script type="text/babel" src="src/components/sections/Reviews.jsx"></script>
  <script type="text/babel" src="src/components/sections/Guides.jsx"></script>

  <!-- Pages -->
  <script type="text/babel" src="src/pages/HomePage.jsx"></script>
  <script type="text/babel" src="src/pages/ProductDetailPage.jsx"></script>
  <script type="text/babel" src="src/pages/CartPage.jsx"></script>
  <script type="text/babel" src="src/pages/AboutPage.jsx"></script>

  <!-- Design System (documentation pages) -->
  <script type="text/babel" src="design-system/ds.jsx"></script>
  <script type="text/babel" src="src/components/ui/button.jsx"></script>

  <!-- App Root -->
  <script type="text/babel" src="src/app.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const App = window.OasisApp;
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
